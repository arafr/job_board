{%extends 'base.html'%}
{%block title%}Sign up as job seeker{%endblock%}
{%block body%}
    <h1>Job Seeker Sign Up</h1>
    <form action="" method="POST">
        <input id="email" name="email" type="email" placeholder="email"/>
        <input id="name" name="name" type="text" placeholder="Full name"/>
        <input id="password" name="password" type="password" placeholder="password"/>

        <select id="education" name="education">
            <option value="" disabled selected>Education</option>
            <option value="high school">High School</option>
            <option value="bachelors degree">Bachelor's Degree</option>
            <option value="masters degree">Master's Degree</option>
            <option value="phd">PhD</option>
        </select>

        <input id="major" name="major" type="text" placeholder="Major"/>
        <input id="yoe" name="yoe" type="number" placeholder="Years of Experience"/>

        <label for="skills">Skills (use ctrl to select multiple, max 5):</label>
        <select class="form-select" name="skills" id="skills" multiple aria-label="select skills">
            <option value="azure">Azure</option>
            <option value="aws">AWS</option>
            <option value="gwp">GWP</option>
            <option value="sql">SQL</option>
            <option value="python">Python</option>
            <option value="flask">Flask</option>
            <option value="jinja2">Jinja2</option>
            <option value="project management">Project Management</option>
            <option value="microsoft office">Microsoft Office</option>
            <option value="burp suite">Burp Suite</option>
            <option value="nessus">Nessus</option>
        </select>
        
        <select id="prefered_work_mode" name="prefered_work_mode">
            <option value="" disabled selected>Prefered Work Mode</option>
            <option value="remote">Remote</option>
            <option value="on_site">On-site</option>
            <option value="hybrid">Hybrid</option>
        </select>

        <select id="prefered_location" name="prefered_location">
            <option value="" disabled selected>Prefered Location</option>
            <option value="Sydney">Sydney</option>
            <option value="Melbourne">Melbourne</option>
            <option value="Adelaide">Adelaide</option>
            <option value="Perth">Perth</option>
            <option value="Canberra">Canberra</option>
            <option value="Hobart">Hobart</option>
        </select>
        
        <button class="btn btn-primary" type="submit">Sign up</button>
    </form>
    <a href="{{url_for('login_seeker')}}">Login instead</a>
{%endblock%}
